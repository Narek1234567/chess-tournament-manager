<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <title>Chess Tournament Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <h1>♟ Chess Tournament Manager</h1>
    <p>Manage players, games, ratings and leaderboard</p>
  </header>

  <section class="grid">
    <div class="card">
      <h2>Add Player</h2>
      <input id="playerName" type="text" placeholder="Player name">
      <input id="playerRating" type="number" placeholder="Rating" value="1200">
      <button id="addPlayerBtn">Add Player</button>
    </div>

    <div class="card">
      <h2>Register Game</h2>
      <select id="whitePlayer"></select>
      <select id="blackPlayer"></select>
      <select id="result">
        <option value="white">White wins</option>
        <option value="black">Black wins</option>
        <option value="draw">Draw</option>
      </select>
      <button id="saveGameBtn">Save Game</button>
    </div>

    <div class="card stats">
      <h2>Statistics</h2>
      <p>Players: <span id="totalPlayers">0</span></p>
      <p>Games: <span id="totalGames">0</span></p>
      <p>Leader: <span id="leaderName">-</span></p>
    </div>
  </section>

  <section class="card">
    <h2>Leaderboard</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Rating</th>
          <th>Wins</th>
          <th>Losses</th>
          <th>Draws</th>
          <th>Points</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="playersTable"></tbody>
    </table>
  </section>

  <section class="card">
    <h2>Game History</h2>
    <ul id="gameHistory"></ul>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
